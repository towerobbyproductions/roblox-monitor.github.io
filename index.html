<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TowerObby Analytics - Мониторинг Roblox игр и сообществ</title>
    <link rel="stylesheet" href="/css/global.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="container">
            <h1>TowerObby Analytics</h1>
            <p class="subtitle">Мониторинг популярных Roblox игр и сообществ</p>
        </div>
    </header>

    <main class="container">
        <section class="games-section">
            <h2>🎮 Активные игры</h2>
            <div id="games-container" class="cards-grid">
                <!-- Игры загружаются через JS -->
            </div>
        </section>

        <section class="communities-section">
            <h2>👥 Сообщества</h2>
            <div id="communities-container" class="cards-grid">
                <!-- Сообщества загружаются через JS -->
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>TowerObby Analytics © 2024 | Данные обновляются в реальном времени через RoProxy</p>
        </div>
    </footer>

    <script src="/js/script.js"></script>
</body>
</html>
